<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Retro Pager — Archive</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <h1>&gt; SMART RETRO PAGER ARCHIVE</h1>
    <p class="sub">Phase 4B — history by username (no login)</p>
  </header>

  <section class="panel">
    <h2>Profile &amp; history</h2>
    <div class="row">
      <label for="username">username</label>
      <input id="username" type="text" placeholder="alice" autocomplete="off" />
      <button type="button" id="btn-load">LOAD</button>
    </div>
    <p id="profile-status" class="status"></p>
    <pre id="profile-block" class="block hidden"></pre>
  </section>

  <section class="panel">
    <h2>Messages</h2>
    <p id="messages-status" class="status"></p>
    <div id="messages-list" class="messages"></div>
  </section>

  <section class="panel">
    <h2>Test send (POST /api/v1/messages)</h2>
    <div class="grid">
      <label>deviceId <input id="send-device" type="text" placeholder="84F3EB12ABCD" /></label>
      <label>senderName <input id="send-sender" type="text" placeholder="web" /></label>
      <label class="full">text <input id="send-text" type="text" placeholder="Hello" /></label>
    </div>
    <button type="button" id="btn-send">SEND</button>
    <p id="send-status" class="status"></p>
  </section>

  <script src="/app.js"></script>
</body>
</html>
