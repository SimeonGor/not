server:
  port: 8080

spring:
  application:
    name: smart-retro-pager-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/pager_db
    username: pager_user
    password: pager_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

mqtt:
  broker-url: tcp://localhost:1883
  client-id: pager-backend
  qos: 1

pairing:
  pin-ttl-seconds: 300
  pin-length: 6
  pin-salt: ${PAIRING_PIN_SALT:dev-salt-change-me}

telegram:
  bot-token: ${TG_BOT_TOKEN:}
  bot-username: ${TG_BOT_USERNAME:}

web-auth:
  code-ttl-seconds: 300
  code-length: 6
  code-salt: ${WEB_AUTH_CODE_SALT:dev-web-auth-salt-change-me}
  jwt-secret: ${WEB_AUTH_JWT_SECRET:dev-jwt-secret-change-me-min-32-chars!!}
  jwt-ttl-seconds: 3600
