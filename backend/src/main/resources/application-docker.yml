# Профиль для запуска в Docker Compose (имена сервисов вместо localhost).
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/pager_db
    username: pager_user
    password: pager_password

mqtt:
  broker-url: tcp://mosquitto:1883
  client-id: pager-backend
  qos: 1

pairing:
  pin-ttl-seconds: 300
  pin-length: 6
  pin-salt: ${PAIRING_PIN_SALT:dev-salt-change-me}

telegram:
  bot-token: ${TG_BOT_TOKEN:}
  bot-username: ${TG_BOT_USERNAME:}
