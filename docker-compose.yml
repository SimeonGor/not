services:
  postgres:
    image: postgres:16
    container_name: pager-postgres
    environment:
      POSTGRES_DB: pager_db
      POSTGRES_USER: pager_user
      POSTGRES_PASSWORD: pager_password
    ports:
      - "5432:5432"
    volumes:
      - pager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pager_user -d pager_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pager-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pager-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_BOT_USERNAME: ${TG_BOT_USERNAME:-}
      PAIRING_PIN_SALT: ${PAIRING_PIN_SALT:-}
    ports:
      - "8080:8080"

volumes:
  pager_postgres_data:
